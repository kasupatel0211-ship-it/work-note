<!DOCTYPE html>
<html>
<head>
    <title>Work Note</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --bg: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            --card: rgba(255,255,255,0.08);
            --task: rgba(255,255,255,0.10);
            --text: white;
        }

        body.light{
            --bg: linear-gradient(135deg,#f5f7fa,#c3cfe2);
            --card: white;
            --task: #f3f3f3;
            --text: black;
        }

        body{
            margin:0;
            min-height:100vh;
            background:var(--bg);
            display:flex;
            justify-content:center;
            align-items:center;
            padding:15px;
            color:var(--text);
            font-family:Arial,sans-serif;
            transition:0.3s;
        }

        .app{
            width:100%;
            max-width:500px;
            background:var(--card);
            backdrop-filter:blur(15px);
            border-radius:20px;
            padding:20px;
            box-shadow:0 8px 30px rgba(0,0,0,0.4);
        }

        .top-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:15px;
        }

        .toggle-btn{
            border:none;
            padding:8px 12px;
            border-radius:10px;
            cursor:pointer;
        }

        .welcome{
            text-align:center;
            margin-bottom:15px;
            font-size:17px;
        }

        .stats{
            display:flex;
            gap:10px;
            margin-bottom:20px;
        }

        .stat-card{
            flex:1;
            text-align:center;
            padding:12px;
            border-radius:12px;
            background:var(--task);
        }

        .input-box{
            display:flex;
            gap:10px;
            margin-bottom:20px;
        }

        .input-box input{
            flex:1;
            border:none;
            outline:none;
            padding:12px;
            border-radius:10px;
        }

        .add-btn{
            border:none;
            border-radius:10px;
            padding:12px 15px;
            background:#00c6ff;
            color:white;
        }

        .task{
            background:var(--task);
            padding:12px;
            border-radius:12px;
            margin-bottom:10px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .done{
            text-decoration:line-through;
            opacity:0.6;
        }

        .icons a{
            margin-left:10px;
            text-decoration:none;
            font-size:18px;
        }

        .fa-pen{
            color:#ffc107;
        }

        .fa-check{
            color:#00ff99;
        }

        .fa-trash{
            color:#ff4d4d;
        }

        .logout-btn{
            background:#ff4d4d;
            color:white;
            text-decoration:none;
            padding:8px 12px;
            border-radius:10px;
        }

        .empty{
            text-align:center;
            padding:20px;
            opacity:0.8;
        }

        @media(max-width:500px){
            .stats{
                flex-direction:column;
            }
        }
    </style>
</head>

<body>

<div class="app">

    <!-- Header -->
    <div class="top-bar">

        <h3>📝 Work Note</h3>

        <div>
            <button class="toggle-btn"
                    onclick="toggleTheme()">🌙</button>

            <a href="/logout"
               class="logout-btn">
                Logout
            </a>
        </div>

    </div>

    <!-- Username -->
    <div class="welcome">
        Welcome, <b>{{ username }}</b> 👋
    </div>

    <!-- Stats -->
    <div class="stats">

        <div class="stat-card">
            <strong>{{ total_tasks }}</strong><br>
            Total
        </div>

        <div class="stat-card">
            <strong>{{ completed_tasks }}</strong><br>
            Done
        </div>

        <div class="stat-card">
            <strong>{{ pending_tasks }}</strong><br>
            Pending
        </div>

    </div>

    <!-- Add Task -->
    <form action="/add"
          method="POST"
          class="input-box">

        <input
            type="text"
            name="task"
            placeholder="Enter task..."
            required>

        <button class="add-btn">
            Add
        </button>

    </form>

    <!-- Empty State -->
    {% if tasks|length == 0 %}
        <div class="empty">
            🚀 No tasks yet.<br>
            Add your first task.
        </div>
    {% endif %}

    <!-- Tasks -->
    {% for task in tasks %}

    <div class="task">

        <div class="{% if task.done %}done{% endif %}">
            {{ task.text }}
        </div>

        <div class="icons">

            <a href="/edit/{{ task.id }}">
                <i class="fa-solid fa-pen"></i>
            </a>

            <a href="/done/{{ task.id }}">
                <i class="fa-solid fa-check"></i>
            </a>

            <a href="/delete/{{ task.id }}"
               onclick="return confirm('Delete this task?')">
                <i class="fa-solid fa-trash"></i>
            </a>

        </div>

    </div>

    {% endfor %}

</div>

<script>
    function toggleTheme() {

        document.body.classList.toggle("light");

        let btn =
            document.querySelector(".toggle-btn");

        if(document.body.classList.contains("light")){
            btn.innerHTML = "☀️";
        }
        else{
            btn.innerHTML = "🌙";
        }
    }
</script>

</body>
</html>
