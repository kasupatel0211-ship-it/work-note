<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            margin:0;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            font-family:Arial,sans-serif;
        }

        .card-box{
            width:100%;
            max-width:400px;
            padding:30px;
            border-radius:20px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(15px);
            box-shadow:0 8px 30px rgba(0,0,0,0.4);
            color:white;
        }

        h2{
            text-align:center;
            margin-bottom:25px;
        }

        .form-control{
            border:none;
            border-radius:10px;
            padding:12px;
        }

        .btn-register{
            width:100%;
            border:none;
            border-radius:10px;
            padding:12px;
            background:#00c6ff;
            color:white;
            font-weight:bold;
        }

        .btn-register:hover{
            background:#0095ff;
        }

        .link{
            text-align:center;
            margin-top:15px;
        }

        .link a{
            color:#00c6ff;
            text-decoration:none;
        }
    </style>
</head>

<body>

<div class="card-box">

    <h2>📝 Create Account</h2>

    {% if error %}
<div class="alert alert-danger">
    {{ error }}
</div>
{% endif %}

    <form method="POST">

        <input
            type="text"
            name="username"
            class="form-control mb-3"
            placeholder="Username"
            required>

        <input
            type="password"
            name="password"
            class="form-control mb-3"
            placeholder="Password"
            required>

        <button class="btn-register">
            Register
        </button>

    </form>

    <div class="link">
        Already have an account?
        <a href="/login">Login</a>
    </div>

</div>

</body>
</html>
